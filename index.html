    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Nunito', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .flip-card {
            perspective: 1000px;
            height: 280px;
        }
        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            height: 100%;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .emoji-bounce {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-overlay {
            animation: fadeInOverlay 0.3s ease-out;
        }
        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .dark .flip-card-front {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        .dark .flip-card-back {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }
    </style>
</head>

                        <option value="en">🇬🇧 English</option>
                        <option value="ca">🏴 Català</option>

                        <span id="darkModeIcon">🌙</span>
                    </button>
                    
                    <!-- Cambiar nivel -->

            </div>

            </div>

                    📋 <span data-i18n="viewAll">Ver Todo</span>

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            // Cargar preferencias guardadas
            const savedLang = localStorage.getItem('language') || 'es';
            const savedLevel = localStorage.getItem('userLevel');
            const savedDarkMode = localStorage.getItem('darkMode') === 'true';

            // Aplicar modo oscuro
            if (savedDarkMode) {
                document.documentElement.classList.add('dark');
                updateDarkModeIcon();
            }

            // Aplicar idioma
            currentLanguage = savedLang;
            document.getElementById('languageSelect').value = savedLang;
            applyTranslations();

            // Mostrar modal si no hay nivel guardado
            if (!savedLevel) {
                document.getElementById('userModal').classList.remove('hidden');
            } else {
                currentUserLevel = savedLevel;
                document.getElementById('userModal').classList.add('hidden');
                renderCards();
            }
        });

        // Seleccionar nivel de usuario
        function selectUserLevel(level) {
            currentUserLevel = level;
            localStorage.setItem('userLevel', level);
            document.getElementById('userModal').classList.add('hidden');
            renderCards();
        }

        // Mostrar modal de usuario
        function showUserModal() {
            document.getElementById('userModal').classList.remove('hidden');
        }

        // Cambiar idioma
        function changeLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('language', lang);
            applyTranslations();
            renderCards();
        }

        // Aplicar traducciones
        function applyTranslations() {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLanguage][key]) {
                    el.textContent = translations[currentLanguage][key];
                }
            });

            const placeholders = document.querySelectorAll('[data-i18n-placeholder]');
            placeholders.forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[currentLanguage][key]) {
                    el.placeholder = translations[currentLanguage][key];
                }
            });
        }

        // Modo oscuro
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            updateDarkModeIcon();
        }

        function updateDarkModeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('darkModeIcon').textContent = isDark ? '☀️' : '🌙';
        }

            const grid = document.getElementById('gridView');
            grid.innerHTML = data.map((item, index) => `

                btnQuiz.classList.remove('bg-gray-300', 'dark:bg-gray-700', 'text-gray-600', 'dark:text-gray-300');
                btnGrid.classList.remove('bg-blue-500', 'text-white');
                btnGrid.classList.add('bg-gray-300', 'dark:bg-gray-700', 'text-gray-600', 'dark:text-gray-300');
                startQuiz();
            }
        }

        // Mezclar tarjetas
        function shuffleCards() {
            const data = [...glossaryData[currentUserLevel]].sort(() => Math.random() - 0.5);
            glossaryData[currentUserLevel] = data;
            renderCards();
        }

        // Quiz
        function startQuiz() {
            score = 0;
            document.getElementById('quizScore').classList.add('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const data = glossaryData[currentUserLevel];
            const randomIndex = Math.floor(Math.random() * data.length);
            currentQuestion = data[randomIndex];
            
            const wrongOptions = data
                .filter(item => item.term !== currentQuestion.term)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            
            const allOptions = [currentQuestion, ...wrongOptions].sort(() => Math.random() - 0.5);

            document.getElementById('questionCard').innerHTML = `
                <div class="text-6xl mb-4">${currentQuestion.emoji}</div>
                <h3 class="text-3xl font-bold text-gray-800 dark:text-white">${currentQuestion.term}</h3>
                <p class="text-gray-600 dark:text-gray-300 mt-2">${translations[currentLanguage].whatMeans}</p>
            `;

            document.getElementById('answersGrid').innerHTML = allOptions.map((option, index) => `
                <button onclick="checkAnswer(${index}, '${option.term}')" 
                        class="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-600 hover:border-purple-400 dark:hover:border-purple-500 hover:bg-purple-50 dark:hover:bg-purple-900 transition text-left font-semibold text-gray-700 dark:text-gray-200">
                    ${String.fromCharCode(65 + index)}. ${option.title[currentLanguage]}
                </button>
            `).join('');

            document.getElementById('quizResult').classList.add('hidden');
        }

        function checkAnswer(selectedIndex, selectedTerm) {
            const isCorrect = selectedTerm === currentQuestion.term;
            const resultDiv = document.getElementById('quizResult');
            const buttons = document.getElementById('answersGrid').children;

            if (isCorrect) {
                score++;
                resultDiv.innerHTML = `
                    <div class="bg-green-100 dark:bg-green-900 border-2 border-green-500 text-green-800 dark:text-green-200 p-4 rounded-xl">
                        <p class="text-2xl font-bold">¡Correcto! 🎉</p>
                        <p class="mt-2">${currentQuestion.definition[currentLanguage]}</p>
                    </div>
                `;
                buttons[selectedIndex].classList.add('bg-green-500', 'text-white', 'border-green-500');
            } else {
                resultDiv.innerHTML = `
                    <div class="bg-red-100 dark:bg-red-900 border-2 border-red-500 text-red-800 dark:text-red-200 p-4 rounded-xl">
                        <p class="text-2xl font-bold">¡Casi! 😊</p>
                        <p class="mt-2">La respuesta era: <strong>${currentQuestion.title[currentLanguage]}</strong></p>
                        <p class="mt-2 text-sm">${currentQuestion.definition[currentLanguage]}</p>
                    </div>
                `;
                buttons[selectedIndex].classList.add('bg-red-500', 'text-white', 'border-red-500');
            }

            resultDiv.classList.remove('hidden');
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('quizScore').classList.remove('hidden');

            setTimeout(nextQuestion, 3000);
        }
    </script>
</body>
</html>
